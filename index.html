<!DOCTYPE html>
<html lang="en">

<head>

    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="stylesheet" href="random-generator.css">
    <script src="random-generator.js"></script>

    <title>Random Sequence Generator</title>

</head>

<body>

    <div id="generator-container">
        <div id="generator-input">
            <input id="number-interval-input-from-field" type="number" class="number-input-fields"
                placeholder="From inclusive">
            <input id="number-interval-input-to-field" type="number" class="number-input-fields"
                placeholder="To inclusive">
        </div>

        <div id="generator-output"></div>

        <div id="generator-settings">

            <div id="generator-settings-sequence-length">
                <div id="generstor-settings-sequence-length-header">
                    Sequence length
                </div>
                <fieldset id="generator-settings-sequence-length-options">
                    <div>
                        <input type="radio" id="generator-settings-sequence-length-range" name="quantity">
                        <label for="generator-settings-sequence-length-range">Range length</label>
                    </div>
                    <div>
                        <input type="radio" id="generator-settings-sequence-length-num" name="quantity">
                        <input type="number" id="generator-settings-sequence-length-num-input">
                    </div>
                </fieldset>
            </div>

            <div id="generator-settings-sequence-format">
                <div id="generator-settings-sequence-format-header">
                    Formating
                </div>
                <fieldset id="generator-settings-sequence-format-options">
                    <div>
                        <input type="radio" id="generator-settings-sequence-format-column" name="format">
                        <label for="generator-settings-sequence-format-column">Columns</label>
                    </div>
                    <div>
                        <input type="radio" id="generator-settings-sequence-format-normal" name="format">
                        <label for="generator-settings-sequence-format-normal">1 3 7 5 2 8 9</label>
                    </div>
                    <div>
                        <input type="radio" id="generator-settings-sequence-format-array" name="format">
                        <label for="generator-settings-sequence-format-array">[4, 2, 7, 4, 3, 2]</label>
                    </div>
                </fieldset>
            </div>


        </div>
    </div>

    <footer>

        <div id="pride-badge">
            <img class="pride-banner-flag" src="svg/gay_pride_flag.svg" alt="Pride flag">
            <img class="pride-banner-flag" src="svg/transgender_pride_flag.svg" alt="Transgender pride flag">
            <div id="pride-banner-text">Made by a<br>Transgender<br>Who wishes to be a girl</div>
            <img class="pride-banner-icon" src="svg/transgender-solid.svg">
        </div>

        <div id="git-badge">
            <a href="https://github.com/t79/random-generator">
                <img src="svg/github.svg" alt="Source hosted at GitHub">
                <div id="git-badge-text"><span>Website</span><span>Source</span></div>
            </a>
        </div>

        <div>
            <a href="https://t79.app">
                <div id="t79-badge">
                    a <span>t79.app</span> site
                </div>
            </a>
        </div>
    </footer>

</body>

</html>
